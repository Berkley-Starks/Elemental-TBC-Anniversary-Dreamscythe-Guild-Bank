<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-darkest:    #0a0908;
  --bg-dark:       #13110f;
  --bg-card:       #1a1714;
  --bg-card-hover: #211e19;
  --bg-input:      #0f0e0c;
  --border-dark:   #2a2520;
  --border-gold:   #8b7340;
  --gold:          #c9a84c;
  --gold-bright:   #e5c76b;
  --gold-dim:      #8b7340;
  --text-primary:  #e8dcc8;
  --text-secondary:#9c8e7a;
  --text-muted:    #6b5f50;
  --quality-poor:      #9d9d9d;
  --quality-common:    #e8dcc8;
  --quality-uncommon:  #1eff00;
  --quality-rare:      #0070dd;
  --quality-epic:      #a335ee;
  --quality-legendary: #ff8000;
  --status-stock:   #4ade80;
  --status-low:     #fbbf24;
  --status-out:     #ef4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-darkest);
  color: var(--text-primary);
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(160,132,92,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.page-wrapper {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* Header */
.site-header {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--border-dark);
  margin-bottom: 2rem;
}

.guild-crest { font-size: 2rem; margin-bottom: 0.25rem; }

.guild-name {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(201,168,76,0.2);
}

.guild-subtitle {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  color: var(--text-secondary);
  font-size: 1.05rem;
  margin-top: 0.25rem;
}

.last-updated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.75rem;
  letter-spacing: 0.03em;
}

/* Summary bar */
.summary-bar {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
  padding: 1rem 0;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border-dark);
}

.summary-stat {
  text-align: center;
}

.summary-stat .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--gold-bright);
}

.summary-stat .stat-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.summary-stat .stat-value.warn { color: var(--status-low); }
.summary-stat .stat-value.danger { color: var(--status-out); }

/* Search */
.search-bar {
  position: relative;
  margin-bottom: 1.75rem;
}

.search-bar input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-dark);
  color: var(--text-primary);
  font-family: 'Crimson Text', serif;
  font-size: 1rem;
  padding: 0.7rem 1rem 0.7rem 2.5rem;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}

.search-bar input:focus { border-color: var(--gold-dim); }
.search-bar input::placeholder { color: var(--text-muted); font-style: italic; }

.search-bar .search-icon {
  position: absolute;
  left: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.9rem;
  pointer-events: none;
}

/* Filter chips */
.filter-bar {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.filter-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.03em;
  color: var(--text-muted);
  background: var(--bg-card);
  border: 1px solid var(--border-dark);
  padding: 0.25rem 0.65rem;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.filter-chip:hover { border-color: var(--gold-dim); color: var(--text-secondary); }
.filter-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

/* Categories */
.category-section { margin-bottom: 1.5rem; }

.category-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border-dark);
  margin-bottom: 0.4rem;
  cursor: pointer;
  user-select: none;
}

.category-header:hover .category-name { color: var(--gold-bright); }
.category-emoji { font-size: 1.15rem; }

.category-name {
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: color 0.15s;
}

.category-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: auto;
}

.category-chevron {
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: transform 0.2s;
}

.category-section.collapsed .category-chevron { transform: rotate(-90deg); }
.category-section.collapsed .category-items { display: none; }

.category-items {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0 1.5rem;
}

@media (max-width: 900px) {
  .category-items { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .category-items { grid-template-columns: 1fr; }
}

/* Item rows */
.item-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 0.35rem 0.6rem;
  border-radius: 3px;
  transition: background 0.1s;
}

.item-row:hover { background: var(--bg-card-hover); }

.item-link {
  color: var(--text-primary);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.1s;
  font-size: 0.97rem;
}

.item-link:hover { text-decoration: underline; text-underline-offset: 2px; }

.item-link.q-poor      { color: var(--quality-poor); }
.item-link.q-common    { color: var(--quality-common); }
.item-link.q-uncommon  { color: var(--quality-uncommon); }
.item-link.q-rare      { color: var(--quality-rare); }
.item-link.q-epic      { color: var(--quality-epic); }
.item-link.q-legendary { color: var(--quality-legendary); }

.item-qty-wrap {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding-left: 1rem;
}

.item-qty {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
}

.item-qty.stock  { color: var(--status-stock); }
.item-qty.low    { color: var(--status-low); }
.item-qty.out    { color: var(--status-out); }

.restock-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--status-out);
  background: rgba(239,68,68,0.1);
  padding: 0.1rem 0.35rem;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.low-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--status-low);
  background: rgba(251,191,36,0.1);
  padding: 0.1rem 0.35rem;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Empty / loading states */
.loading-state, .empty-state {
  text-align: center;
  color: var(--text-muted);
  font-style: italic;
  padding: 3rem 1rem;
}

.loading-spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border-dark);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 0.75rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 640px) {
  .page-wrapper { padding: 1rem; }
  .guild-name { font-size: 1.5rem; }
  .summary-bar { gap: 1rem; }
  .item-row { padding: 0.25rem 0.3rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-darkest); }
::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="site-header">
    <div class="guild-crest">🏦</div>
    <h1 class="guild-name" id="guildName">Guild Bank</h1>
    <p class="guild-subtitle">Inventory Tracker</p>
    <p class="last-updated" id="lastUpdated">Loading...</p>
  </header>

  <div class="summary-bar" id="summaryBar"></div>

  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search items...">
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <div id="inventoryContainer">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading inventory...</p>
    </div>
  </div>

</div>

<script>
// ================================================================
// CONFIGURATION
// ================================================================
const CONFIG = {
  inventoryUrl: 'inventory.json',
  wowheadBase: 'https://www.wowhead.com/tbc/item=',
  lowStockThreshold: 5,
};

// ================================================================
// STATE
// ================================================================
let data = null;
let activeFilter = 'all';

// ================================================================
// LOAD & RENDER
// ================================================================
async function init() {
  try {
    const resp = await fetch(CONFIG.inventoryUrl + '?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();

    document.getElementById('guildName').textContent = data.guild || 'Guild Bank';

    const updated = new Date(data.updated);
    document.getElementById('lastUpdated').textContent =
      'Last scanned: ' + updated.toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric'
      }) + ' at ' + updated.toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit'
      });

    renderSummary();
    renderFilters();
    renderInventory();
  } catch (err) {
    document.getElementById('inventoryContainer').innerHTML =
      '<div class="empty-state">Could not load inventory.<br>Make sure <code>inventory.json</code> exists in the repo.</div>';
    console.error(err);
  }
}

function renderSummary() {
  let totalItems = 0, uniqueItems = 0, outOfStock = 0, lowStock = 0;

  data.categories.forEach(cat => {
    cat.items.forEach(item => {
      uniqueItems++;
      totalItems += item.count;
      if (item.count === 0) outOfStock++;
      else if (item.count <= CONFIG.lowStockThreshold) lowStock++;
    });
  });

  const bar = document.getElementById('summaryBar');
  bar.innerHTML = `
    <div class="summary-stat">
      <div class="stat-value">${totalItems}</div>
      <div class="stat-label">Total Items</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value">${uniqueItems}</div>
      <div class="stat-label">Tracked</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value ${lowStock > 0 ? 'warn' : ''}">${lowStock}</div>
      <div class="stat-label">Low Stock</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value ${outOfStock > 0 ? 'danger' : ''}">${outOfStock}</div>
      <div class="stat-label">Out of Stock</div>
    </div>
  `;
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  let html = `<span class="filter-chip active" data-cat="all">All</span>`;
  html += `<span class="filter-chip" data-cat="restock">⚠ Needs Restock</span>`;
  data.categories.forEach(cat => {
    html += `<span class="filter-chip" data-cat="${esc(cat.name)}">${cat.emoji || '📦'} ${esc(cat.name)}</span>`;
  });
  bar.innerHTML = html;

  bar.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.cat;
      renderInventory(document.getElementById('searchInput').value);
    });
  });
}

function renderInventory(search = '') {
  const container = document.getElementById('inventoryContainer');
  const q = search.toLowerCase();
  let html = '';

  const catsToShow = activeFilter === 'all' || activeFilter === 'restock'
    ? data.categories
    : data.categories.filter(c => c.name === activeFilter);

  catsToShow.forEach(cat => {
    let items = cat.items;

    // Text search
    if (q) items = items.filter(i => i.name.toLowerCase().includes(q));

    // Restock filter
    if (activeFilter === 'restock') {
      items = items.filter(i => i.count === 0 || i.count <= CONFIG.lowStockThreshold);
    }

    if (items.length === 0) return;

    const catTotal = items.reduce((s, i) => s + i.count, 0);

    html += `<div class="category-section">`;
    html += `<div class="category-header" onclick="this.parentElement.classList.toggle('collapsed')">`;
    html += `<span class="category-emoji">${cat.emoji || '📦'}</span>`;
    html += `<span class="category-name">${esc(cat.name)}</span>`;
    html += `<span class="category-count">${items.length} items · ${catTotal} total</span>`;
    html += `<span class="category-chevron">▾</span>`;
    html += `</div><div class="category-items">`;

    items.forEach(item => {
      const url = item.itemId && item.itemId !== '0'
        ? CONFIG.wowheadBase + item.itemId + '/' + slug(item.name)
        : 'https://www.wowhead.com/tbc/search?q=' + encodeURIComponent(item.name);
      const qClass = 'q-' + (item.quality || 'common').toLowerCase();

      let qtyClass = 'stock';
      let tag = '';
      if (item.count === 0) {
        qtyClass = 'out';
        tag = '<span class="restock-tag">restock</span>';
      } else if (item.count <= CONFIG.lowStockThreshold) {
        qtyClass = 'low';
        tag = '<span class="low-tag">low</span>';
      }

      const nameHtml = `<a href="${url}" target="_blank" rel="noopener" class="item-link ${qClass}">${esc(item.name)}</a>`;

      html += `<div class="item-row">${nameHtml}<div class="item-qty-wrap"><span class="item-qty ${qtyClass}">×${item.count}</span>${tag}</div></div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html || '<div class="empty-state">No items match your search.</div>';
}

document.getElementById('searchInput').addEventListener('input', e => {
  if (data) renderInventory(e.target.value);
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function slug(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

init();
</script>
</body>
</html>
